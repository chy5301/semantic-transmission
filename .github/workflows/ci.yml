name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  lint-and-test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: 安装 uv 和 Python
        uses: astral-sh/setup-uv@v7
        with:
          python-version: "3.12"

      - name: 安装依赖
        run: uv sync --dev

      - name: 代码检查（ruff check）
        run: uv run ruff check .

      - name: 格式检查（ruff format）
        run: uv run ruff format --check .

      - name: 运行测试（pytest）
        run: uv run pytest tests/
